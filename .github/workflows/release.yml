name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - packages/convex-zen/**
      - packages/convex-zen-organization/**
      - packages/convex-zen-system-admin/**
      - scripts/release/**
      - package.json
      - pnpm-lock.yaml
      - .releaserc.cjs
      - .github/workflows/release.yml

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify publishable packages
        run: pnpm --filter convex-zen --filter convex-zen-organization --filter convex-zen-system-admin build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release
